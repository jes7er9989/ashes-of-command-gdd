<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ══════════════ HEAD - Meta, Fonts & Styles ══════════════
       Standard meta tags, Google Fonts preconnect, and the single
       global stylesheet that themes the entire application.        -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ashes of Command: The Reclamation — Interactive GDD</title>
  <meta name="description" content="Ashes of Command: The Reclamation — Interactive Game Design Document v5.9.1">
  <meta name="theme-color" content="#07080c">

  <!-- Fonts: preconnect speeds up the Google Fonts fetch -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Styles: single stylesheet - no component-level CSS -->
  <link rel="stylesheet" href="css/global.css">

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="icon" type="image/png" href="assets/icon-192.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Ashes of Command: The Reclamation — Interactive GDD">
  <meta property="og:description" content="4X grand strategy auto-battler. 7 factions, 105 units, 208 equipment. Complete game design document.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ashesofcommand.com">
  <meta property="og:image" content="https://ashesofcommand.com/assets/icon-512.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Ashes of Command: The Reclamation — Interactive GDD">
  <meta name="twitter:description" content="4X grand strategy auto-battler. 7 factions, 105 units, 208 equipment. Complete game design document.">
  <meta name="twitter:image" content="https://ashesofcommand.com/assets/icon-512.png">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <!-- ══════════════ MOBILE NAV CONTROLS ══════════════
       Hamburger button and dark overlay shown only at ≤768px.
       The overlay closes the sidebar when tapped.                 -->
  <button class="hamburger" id="hamburger" aria-label="Toggle navigation">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-overlay" id="mobile-overlay"></div>

  <div class="app-layout">

    <!-- ══════════════ SIDEBAR ══════════════
         Fixed left panel containing:
           • Brand header (title + version)
           • Quick-filter input for chapters
           • Scrollable nav tree (rendered by Nav.render())
           • Footer with document stats                            -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">ASHES OF COMMAND</div>
        <div class="sidebar-subtitle-sm">THE RECLAMATION</div>
        <div class="sidebar-subtitle">Interactive GDD v5.9.1</div>
      </div>

      <div class="sidebar-search">
        <div class="sidebar-search-wrap">
          <span class="sidebar-search-icon">&#128269;</span>
          <input type="text" id="nav-search" placeholder="Search..." autocomplete="off" spellcheck="false">
          <span class="sidebar-search-shortcut">Ctrl+K</span>
        </div>
        <button class="sidebar-filter-btn" id="sidebar-filter-btn">
          <span class="filter-icon">&#9776;</span>
          <span class="filter-label">Filter by Category</span>
          <span class="filter-chevron">&#9662;</span>
        </button>
        <div class="sidebar-filter-dropdown" id="sidebar-filter-dropdown">
          <button class="filter-option active" data-category="all">All</button>
          <button class="filter-option" data-category="lore">Lore &amp; Narrative</button>
          <button class="filter-option" data-category="factions">Factions</button>
          <button class="filter-option" data-category="maps">Maps &amp; Exploration</button>
          <button class="filter-option" data-category="combat">Combat</button>
          <button class="filter-option" data-category="strategy">Strategy &amp; Diplomacy</button>
          <button class="filter-option" data-category="endgame">Endgame &amp; Meta</button>
          <button class="filter-option" data-category="presentation">Presentation</button>
          <button class="filter-option" data-category="business">Business</button>
          <button class="filter-option" data-category="reference">Reference</button>
        </div>
      </div>

      <nav class="sidebar-nav" id="nav-container">
        <!-- Nav tree is rendered here by Nav.render() -->
      </nav>

      <div class="sidebar-footer">
        <div>8 Parts · 46 Chapters · 13 Appendices</div>
        <div>7 Factions · 105 Units · 208 Equipment</div>
      </div>
    </aside>

    <!-- ══════════════ SIDEBAR TOGGLE ══════════════
         Desktop-only collapse button (hidden on mobile where
         the hamburger is used instead).                           -->
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">◀</button>

    <!-- ══════════════ MAIN CONTENT ══════════════
         Primary content area. Chapter HTML fragments and the
         dashboard are injected into #content-area by the router.  -->
    <main class="main-content" id="main-content">
      <div id="content-area">
        <!-- Pages render here (Dashboard or Chapter HTML) -->
      </div>
    </main>
  </div>

  <!-- ══════════════ SEARCH OVERLAY ══════════════
       Command-palette style search (Ctrl+K / Cmd+K).
       Floats above everything at z-index 1000.                    -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-box">
      <div class="search-input-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search-input" placeholder="Search chapters, factions, units, equipment…" autocomplete="off" spellcheck="false">
        <span class="search-hint">ESC</span>
      </div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- ══════════════ AUDIO CONTROLS ══════════════
       Speaker icon in bottom-right expands to a panel with
       MUSIC / SFX / AMBI sliders. Auto-muted on load.            -->
  <div class="audio-controls" id="audio-controls">
    <button class="audio-toggle" id="audio-toggle" aria-label="Toggle audio" title="Toggle ambient audio">
      <span id="audio-icon">&#x1F507;</span>
    </button>
    <div class="audio-panel" id="audio-panel">
      <div class="audio-slider-row">
        <label>MUSIC</label>
        <input type="range" id="audio-music" min="0" max="100" value="50">
      </div>
      <div class="audio-slider-row">
        <label>SFX</label>
        <input type="range" id="audio-sfx" min="0" max="100" value="70">
      </div>
      <div class="audio-slider-row">
        <label>AMBI</label>
        <input type="range" id="audio-ambi" min="0" max="100" value="40">
      </div>
    </div>
  </div>

  <!-- ══════════════ BACK TO TOP ══════════════
       Floating button in the bottom-right corner. Hidden until
       the user scrolls down 300px (toggled by JS below).          -->
  <button class="back-to-top" id="back-to-top" aria-label="Back to top">↑</button>

  <!-- ══════════════ PROCEDURAL BACKGROUND ══════════════
       Full-page layer behind all content. FactionBgSwitcher applies
       faction-specific CSS classes (bg-terran, bg-shards, etc.).   -->
  <div id="procedural-bg"></div>

  <!-- ══════════════ LORE QUOTE ROTATOR ══════════════
       Rotating lore quotes displayed in the sidebar footer area.
       LoreQuoteRotator.init() populates and cycles content.        -->
  <div id="lore-quote-rotator"></div>

  <!-- ══════════════ EDIT BAR (Dev Mode) ══════════════
       Hidden by default. Revealed when body.dev-mode-active is set
       via the 10-click unlock on .sidebar-title.                    -->
  <div id="edit-bar">
    <button id="edit-toggle"><span>✎</span> <span>OFF</span></button>
    <span id="edit-count">0 fields modified</span>
    <button id="export-btn">⤓ Export HTML</button>
  </div>

  <!-- ══════════════ SCRIPTS ══════════════
       Load order matters — 15 files total:
         0. three.min.js (CDN)    - Three.js r128 for 3D renderers (solar system, etc.)
         1. data-loader.js        - No dependencies; provides DataLoader cache
         2. sprite-engine.js      - Depends on DataLoader (reads cached sprite/shape data)
         3. icon-renderer.js      - Depends on DataLoader (reads cached icon data)
         4. faction-renderer.js   - Depends on SpriteEngine + IconRenderer
         5. content-renderers.js  - Depends on DataLoader (planets, formations)
         6. chapter-loader.js     - Depends on DataLoader + FactionRenderer + ContentRenderers
         7. dashboard.js          - Depends on DataLoader
         8. search.js             - Depends on DataLoader
         9. chapter-index.js      - Depends on DataLoader (loads nav-data.json for index tree)
        10. glossary.js           - No dependencies (self-contained glossary terms)
        11. nav.js                - Depends on DataLoader + Dashboard + ChapterLoader
                                    (Nav.route() calls Dashboard.render or ChapterLoader.load)
        12. audio-engine.js       - No dependencies; Web Audio API ambient engine
        13. visual-effects.js     - No dependencies; scanlines, particles, cursor glow, CRT
        14. dev-mode.js           - No dependencies; 10-click unlock, edit bar, export
        15. solar-system.js       - Depends on Three.js; 3D interactive solar system renderer

       nav.js triggers the initial route on init — all renderers
       must be defined before it. Post-nav scripts (12–14) are
       initialized in the boot() sequence below.

       service-worker.js is registered at runtime, not loaded
       as a script tag.                                            -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/data-loader.js"></script>
  <script src="js/sprite-engine.js"></script>
  <script src="js/icon-renderer.js"></script>
  <script src="js/faction-renderer.js"></script>
  <script src="js/planet-renderer.js"></script>
  <script src="js/content-renderers.js"></script>
  <script src="js/chapter-loader.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/search.js"></script>
  <script src="js/chapter-index.js"></script>
  <script src="js/glossary.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/audio-engine.js"></script>
  <script src="js/visual-effects.js"></script>
  <script src="js/dev-mode.js"></script>
  <script src="js/solar-system.js"></script>
  <script src="js/canvas-galaxy.js"></script>


  <script>
    /**
     * Global navigation helper used by onclick handlers in chapter
     * HTML fragments (e.g. onclick="navTo('ch5')").
     * @param {string} id - Chapter ID to navigate to
     */
    function navTo(id) { location.hash = '#' + id; }

    /**
     * Boot Sequence - Initialize all modules in dependency order:
     *   1. ChapterLoader.init()  - cache the content-area reference
     *   2. Nav.init()            - fetch nav data, render sidebar, trigger initial route
     *   3. Search.init()         - wire up Ctrl+K shortcut
     *   4. ChapterIndex.init()   - build index overlay + sidebar toggle button
     *   5. VisualEffects.init()  - scanlines, particles, lore quotes, cursor, tilt, CRT
     *   6. DevMode.init()        - attach 10-click unlock listener to sidebar title
     *   7. Back-to-top button    - show/hide on scroll
     *   8. Service worker        - register for offline caching
     *   Note: Glossary.init() is called by ChapterLoader.load() after each chapter renders
     */
    (async function boot() {
      try {
        DataLoader.init();
        ChapterLoader.init();
        await Nav.init();
        Search.init();
        await ChapterIndex.init();
        VisualEffects.init();
        DevMode.init();

        // Audio engine - auto-muted, user clicks speaker icon to enable
        const audioBtn = document.getElementById('audio-toggle');
        const audioIcon = document.getElementById('audio-icon');
        const audioPanel = document.getElementById('audio-panel');
        const audioControls = document.getElementById('audio-controls');
        let audioPlaying = false;
        let audioInited = false;
        if (audioBtn && typeof AudioEngine !== 'undefined') {
          audioBtn.addEventListener('click', () => {
            if (!audioInited) {
              AudioEngine.init();
              AudioEngine.setFaction('terran');
              audioInited = true;
            }
            AudioEngine.toggle();
            audioPlaying = !audioPlaying;
            audioIcon.innerHTML = audioPlaying ? '&#x1F50A;' : '&#x1F507;';
            audioBtn.setAttribute('data-on', audioPlaying ? '1' : '0');
            if (audioControls) audioControls.classList.toggle('active', audioPlaying);
          });
          // Wire up volume sliders
          const musicSlider = document.getElementById('audio-music');
          const sfxSlider = document.getElementById('audio-sfx');
          const ambiSlider = document.getElementById('audio-ambi');
          if (musicSlider) musicSlider.addEventListener('input', (e) => {
            if (audioInited) AudioEngine.setMusicVol(e.target.value / 100);
          });
          if (sfxSlider) sfxSlider.addEventListener('input', (e) => {
            if (audioInited) AudioEngine.setSfxVol(e.target.value / 100);
          });
          if (ambiSlider) ambiSlider.addEventListener('input', (e) => {
            if (audioInited) AudioEngine.setVolume(e.target.value / 100);
          });
        }

        // ── UI Sound Delegation ─────────────────────────────────
        // Hover sounds on sidebar nav links (event delegation for dynamic content)
        const navContainer = document.getElementById('nav-container');
        if (navContainer) {
          navContainer.addEventListener('mouseenter', (e) => {
            const link = e.target.closest('.nav-chapter');
            if (link && audioInited && audioPlaying) {
              try { AudioEngine.playHover(); } catch(ex) {}
            }
          }, true); // capture phase for mouseenter delegation
        }

        // Click sounds on buttons and interactive elements in main content
        const contentArea = document.getElementById('content-area');
        if (contentArea) {
          contentArea.addEventListener('click', (e) => {
            if (!audioInited || !audioPlaying) return;
            const btn = e.target.closest('button, .back-to-dashboard, .nav-part-header');
            if (btn) {
              try { AudioEngine.playClick(); } catch(ex) {}
            }
          });
        }

        // Back-to-top button handled by Nav.bindBackToTop()

        // Register service worker for offline caching
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('js/service-worker.js')
            .then(reg => console.log('%c[SW] Registered (scope: ' + reg.scope + ')', 'color:#44ff66;font-family:monospace'))
            .catch(err => console.warn('[SW] Registration failed:', err));
        }

        console.log('%c[AOC] Systems online.', 'color:#00b4ff;font-family:monospace');
      } catch (e) {
        console.error('[AOC] Boot failure:', e);
      }
    })();
  </script>

  <!-- Display Controls (top-right) -->
  <div id="display-controls">
    <button id="theme-toggle" title="Toggle light/dark mode" aria-label="Toggle light/dark mode">
      <span id="theme-icon">&#9790;</span>
    </button>
    <div id="brightness-control">
      <span class="brightness-icon">&#9788;</span>
      <input type="range" id="brightness-slider" min="80" max="160" value="100" step="5">
    </div>
  </div>
  <script>
    (() => {
      /* ── Theme Toggle (Dark/Light) ──────────────── */
      const themeBtn = document.getElementById('theme-toggle');
      const themeIcon = document.getElementById('theme-icon');
      const THEME_KEY = 'aoc-theme';
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === 'light') { document.body.classList.add('light-mode'); themeIcon.innerHTML = '&#9728;'; }

      themeBtn.addEventListener('click', () => {
        const isLight = document.body.classList.toggle('light-mode');
        themeIcon.innerHTML = isLight ? '&#9728;' : '&#9790;';
        localStorage.setItem(THEME_KEY, isLight ? 'light' : 'dark');
      });

      /* ── Brightness Slider ──────────────────────── */
      const slider = document.getElementById('brightness-slider');
      const BRIGHT_KEY = 'aoc-brightness';
      const savedBright = localStorage.getItem(BRIGHT_KEY);
      if (savedBright) {
        slider.value = savedBright;
        document.documentElement.style.filter = 'brightness(' + (savedBright / 100) + ')';
      }

      slider.addEventListener('input', () => {
        const v = slider.value;
        document.documentElement.style.filter = 'brightness(' + (v / 100) + ')';
        localStorage.setItem(BRIGHT_KEY, v);
      });
    })();
  </script>
</body>
</html>
